name: Deploy demo site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
        env:
          # The identifier this site renders. SIFA_ID accepts either a DID or a
          # handle; a DID is preferred since it survives handle changes. Fork
          # this repo and set a `SIFA_ID` repository variable to publish your own
          # profile. SIFA_DEMO_ID / SIFA_DEMO_HANDLE stay supported for the
          # canonical demo deployment and for backward compat.
          SIFA_ID: ${{ vars.SIFA_ID || vars.SIFA_DEMO_ID || vars.SIFA_DEMO_HANDLE || 'gui.do' }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
